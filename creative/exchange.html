<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創作通貨両替計算機</title>
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="exchange.css">
    <script src="exchange.js"></script>
</head>

<body>
    <header>
        <ol>
            <li><a href="../index.html">トップページ</a></li>
            <li><a href="../creative.html">創作系の扉</a></li>
            <li>創作通貨両替計算機</li>
        </ol>
    </header>
    <h1>創作通貨両替計算機</h1>
    <main class="container">
        <article>
            <input type="number" id="amount" placeholder="金額を入力">
            <hr>
            <select id="from">
                <option value="100000000">紙セクト</option>
                <option value="1000000">金セクト</option>
                <option value="10000">銀セクト</option>
                <option value="100">銅セクト</option>
                <option value="10">鉄セクト</option>
                <option value="1">錫セクト</option>
            </select>
            から
            <select id="to">
                <option value="100000000">紙セクト</option>
                <option value="1000000">金セクト</option>
                <option value="10000">銀セクト</option>
                <option value="100">銅セクト</option>
                <option value="10">鉄セクト</option>
                <option value="1">錫セクト</option>
            </select>
            <hr>
            <article class="result" id="result"></article>
            <article class="result" id="result-yen"></article>
            <hr>
        </article>
        <dl>
            <dt>セクトについて</dt>
            <dd>
                <p>ここに登場するのはイナールズィーラ帝国の通貨単位です。</p>
                <p>これは架空の通貨であり、実際の通貨とは異なります。</p>
            </dd>
        </dl>
    </main>
    <footer>
        <ol>
            <li><a href="../index.html">トップページ</a></li>
            <li><a href="../creative.html">創作系の扉</a></li>
            <li>創作通貨両替計算機</li>
        </ol>
    </footer>
</body>

</html>
