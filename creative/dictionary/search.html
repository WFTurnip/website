<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>検索結果</title>
    <link rel="stylesheet" href="style/pages.css">
    <link rel="stylesheet" href="style/search.css">
    <link rel="stylesheet" href="style/fonts.css">
    <link rel="stylesheet" href="style/navigator.css">
    <link rel="icon" href="favicon/search.svg" type="image/x-icon">
    <script src="search.js"></script>
</head>

<body>
    <header>
        <ol>
            <li><a href="dictionary.html">表紙</a></li>
            <li>検索結果</li>
        </ol>
    </header>
    <h1>検索結果</h1>
    <main>
        <article>
            <form action="search.html" id="searchForm" method="get">
                <fieldset>
                    <legend>入力欄</legend>
                    <input type="search" id="searchInput" name="searchInput" class="xesada"
                        placeholder="Cipita Gwnosw" />
                </fieldset>
                <fieldset>
                    <legend>絞込設定</legend>
                    <input type="checkbox" id="consonants" name="consonants" value="true" />
                    <label for="consonants">子音</label>
                    <input type="checkbox" id="roots" name="roots" value="true" />
                    <label for="roots">語根</label>
                    <input type="checkbox" id="words" name="words" value="true" />
                    <label for="words">単語</label>
                </fieldset>
                <fieldset>
                    <legend>検索／初期化</legend>
                    <input type="submit" value="検索" />
                    <input type="reset" value="初期化" />
                </fieldset>
            </form>
        </article>
        <article id="searchResult"></article>
        <article id="option"></article>
        <article id="result"></article>
    </main>
    <footer>
        <ol>
            <li><a href="dictionary.html">表紙</a></li>
            <li>検索結果</li>
        </ol>
    </footer>
</body>

</html>
