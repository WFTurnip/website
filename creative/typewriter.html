<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イナールズィーラ語タイプライター</title>
    <link rel="stylesheet" href="typewriter.css">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="../index.css">
    <script src="typewriter.js"></script>
</head>

<body>
    <header>
        <ol>
            <li><a href="../index.html">トップページ</a></li>
            <li><a href="../creative.html">創作系の扉</a></li>
            <li>イナールズィーラ語タイプライター</li>
        </ol>
    </header>
    <h1>イナールズィーラ語タイプライター</h1>
    <main>
        <article>
            <fieldset>
                <legend>タイプテキスト</legend>
                <label>
                    <textarea></textarea>
                </label>
            </fieldset>
            <fieldset>
                <legend>タイプキー</legend>
                <table id="keyboard"></table>
            </fieldset>
            <fieldset>
                <legend>書体切り替え</legend>
                <label for="font-selector"></label><select id="font-selector">
                    <optgroup label="古代書体">
                        <option value="0">ピスピ体</option>
                        <option value="1">スリーヴェ体</option>
                    </optgroup>
                    <hr>
                    <optgroup label="中世書体">
                        <option value="2">コディート体</option>
                        <option value="3">レクータ体</option>
                        <option value="4">ロゼーグ体</option>
                        <option value="5">シルキ体</option>
                        <option value="6">ハヴァーニ体</option>
                        <option value="7">ヘサーダ体</option>
                        <option value="8">ヒディーリ体</option>
                    </optgroup>
                    <hr>
                    <optgroup label="近世書体">
                        <option value="9">マキーナ体</option>
                        <option value="10">ポルゴ体</option>
                        <option value="11">ゾソーク体</option>
                    </optgroup>
                </select>
            </fieldset>
        </article>
        <p>創作している言語のタイプライターを制作してみました。上記のセレクトカラムに表示される書体名については<a href="fonts.html" target="_blank"
                rel="noopener noreferrer">こちらのページ</a>を参照してください。別のタブで書体名目録が開いてくれます。
        </p>
    </main>
    <footer>
        <ol>
            <li><a href="../index.html">トップページ</a></li>
            <li><a href="../creative.html">創作系の扉</a></li>
            <li>イナールズィーラ語タイプライター</li>
        </ol>
    </footer>
</body>

</html>
